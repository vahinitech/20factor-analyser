# CI for the 20-Factor Analyser — runs on every push + PR.
#  - python-tests   : server logic without the heavy paddle/torch install.
#  - e2e            : headless Chrome — analyser app loads, print/handwriting
#                     classification, bundle is in sync with src/.
#  - e2e-recognition: full stack WITH the OCR backend; proves server recognition
#                     works on a sample. Kept fast via a cached Docker layer
#                     (paddle never re-installs) + English-only model warm-up.
name: CI

on:
  push:
  pull_request:

# Least-privilege default: every job here only checks out code, runs tests,
# and builds a local Docker image -- none needs to write to the repo, open
# issues/PRs, or publish packages.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install light server deps (no paddle/torch)
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements-core.txt
      - name: Syntax-check server modules
        run: python -m py_compile backend/ppocr-server.py backend/ocr_backends.py backend/classify.py backend/layout_filter.py backend/analyser-ocr-server.py backend/warmup_models.py backend/benchmark_ocr.py backend/geometry.py backend/model_map.py backend/gpu_detect.py backend/computer_vision.py backend/scoring.py backend/detector.py backend/recognizer.py backend/config.py backend/cache.py
      - name: Check formatting (black, line-length 79)
        run: black --check --line-length 79 frontend/build_bundle.py backend/*.py backend/tests/*.py
      - name: Lint (pylint, min score 9.0)
        run: |
          pylint --fail-under=9.0 frontend/build_bundle.py \
            backend/analyser-ocr-server.py backend/classify.py \
            backend/ocr_backends.py backend/ppocr-server.py \
            backend/layout_filter.py backend/benchmark_ocr.py \
            backend/warmup_models.py backend/geometry.py \
            backend/model_map.py backend/gpu_detect.py \
            backend/computer_vision.py backend/scoring.py \
            backend/detector.py backend/recognizer.py \
            backend/config.py backend/cache.py \
            backend/tests/test_backends_classify.py \
            backend/tests/test_server_pipeline.py \
            backend/tests/test_regression_functional.py \
            backend/tests/test_handwriting_only.py \
            backend/tests/test_layout_filter.py
      - name: Run server unit + integration tests
        run: |
          python -m unittest -v \
            backend.tests.test_backends_classify \
            backend.tests.test_server_pipeline \
            backend.tests.test_regression_functional \
            backend.tests.test_handwriting_only \
            backend.tests.test_layout_filter

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: playwright-${{ runner.os }}-
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Verify the packed bundle is in sync with src/
        run: |
          python3 frontend/build_bundle.py
          if ! git diff --quiet -- frontend/scripts/core/engine.bundle.js; then
            echo "::error::engine.bundle.js is stale. Run 'python frontend/build_bundle.py' and commit it."
            exit 1
          fi
      - name: Headless print/handwriting checks
        run: npm run test:regression:headless

  # Full stack WITH OCR. The slow part (paddle pip install) is cached as a Docker
  # layer via the GHA cache backend, so warm runs skip it entirely.
  e2e-recognition:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build analyser image (cached paddle layer)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./deployment/Dockerfile
          tags: vahini/20factor-analyser:local
          load: true
          cache-from: type=gha,scope=analyser
          cache-to: type=gha,mode=max,scope=analyser
      - name: Start stack (reuses prebuilt image; English only)
        env:
          VAHINI_OCR_LANGS: en
        run: docker compose up -d --wait
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: playwright-${{ runner.os }}-
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Recognition regression (live backend)
        env:
          VAHINI_BASE_URL: http://localhost:8080
        run: npm run test:recognition
      - name: Dump server logs on failure
        if: failure()
        run: docker compose logs --tail 200 analyser
      - name: Tear down
        if: always()
        run: docker compose down -v
